<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />

    <title>Contact — PortfolioApplication</title>
    <meta
      name="description"
      content="POST /collaborate — open to meaningful engineering challenges."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Contact — PortfolioApplication" />
    <meta
      property="og:description"
      content="Always interested in meaningful engineering challenges."
    />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1f2b'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' fill='white' font-family='Inter,system-ui' font-size='14' font-weight='600' dominant-baseline='middle'%3EPA%3C/text%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-page="contact">
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="nav" data-component="navbar" aria-label="Primary"></header>

    <main id="main">
      <section class="page-header">
        <div class="container">
          <span class="endpoint">
            <span class="endpoint__verb">POST</span>
            /collaborate
          </span>
          <h1>Let's start a thoughtful conversation.</h1>
          <p>Always interested in meaningful engineering challenges.</p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="contact-grid">
            <form class="form" data-form="contact" novalidate>
              <div class="form__field" data-field="name">
                <label for="contact-name">name</label>
                <input
                  id="contact-name"
                  name="name"
                  type="text"
                  autocomplete="name"
                  required
                  placeholder="Jane Engineer"
                />
                <span class="form__error">Please enter a name.</span>
              </div>

              <div class="form__field" data-field="email">
                <label for="contact-email">email</label>
                <input
                  id="contact-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  required
                  placeholder="jane@example.com"
                />
                <span class="form__error">Please enter a valid email.</span>
              </div>

              <div class="form__field" data-field="message">
                <label for="contact-message">message</label>
                <textarea
                  id="contact-message"
                  name="message"
                  rows="5"
                  required
                  placeholder="A short note about what you're building."
                ></textarea>
                <span class="form__error">Please add a short message.</span>
              </div>

              <div>
                <button type="submit" class="btn btn--primary btn--mono">
                  Start Conversation
                </button>
              </div>
            </form>

            <aside class="contact-side" aria-label="Other ways to connect">
              <a
                class="contact-link"
                data-bind="contact.linkedin"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="contact-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 8a6 6 0 0 1 6 6v6h-4v-6a2 2 0 0 0-4 0v6h-4v-12h4v2"></path>
                    <rect x="2" y="9" width="4" height="12"></rect>
                    <circle cx="4" cy="4" r="2"></circle>
                  </svg>
                </span>
                <span class="contact-link__meta">
                  <span class="contact-link__label">LinkedIn</span>
                  <span class="contact-link__sub">/in/rohit-kumar-upadhyay</span>
                </span>
              </a>

              <a
                class="contact-link"
                data-bind="contact.github"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="contact-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                  </svg>
                </span>
                <span class="contact-link__meta">
                  <span class="contact-link__label">GitHub</span>
                  <span class="contact-link__sub">@rohit071845</span>
                </span>
              </a>

              <a class="contact-link" data-bind="contact.email" href="#">
                <span class="contact-link__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                  </svg>
                </span>
                <span class="contact-link__meta">
                  <span class="contact-link__label">Email</span>
                  <span class="contact-link__sub">rohitupadhyay451718@gmail.com</span>
                </span>
              </a>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer" data-component="footer" aria-label="Site footer"></footer>

    <script src="assets/js/data-loader.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/easter-eggs.js"></script>
  </body>
</html>
