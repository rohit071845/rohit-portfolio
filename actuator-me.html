<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e131c" />

    <title>/actuator/me — PortfolioApplication</title>
    <meta name="description" content="A small public endpoint." />
    <meta name="robots" content="noindex" />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1f2b'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' fill='white' font-family='Inter,system-ui' font-size='14' font-weight='600' dominant-baseline='middle'%3EPA%3C/text%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <main class="actuator">
      <div>
        <div class="actuator__panel" role="region" aria-label="Actuator endpoint response">
          <div class="actuator__head">
            <span class="actuator__head-dots" aria-hidden="true">
              <span></span><span></span><span></span>
            </span>
            <span>GET</span>
            <span>/actuator/me</span>
            <span style="margin-left:auto;">200 OK</span>
          </div>
          <pre class="actuator__body" id="actuator-json" aria-live="polite"></pre>
        </div>
        <a class="actuator__back" href="index.html">← back to /</a>
      </div>
    </main>

    <script>
      // Render formatted JSON with light syntax coloring. Kept in-page
      // because this endpoint is intentionally standalone and minimal.
      (function () {
        const payload = {
          name: 'Rohit Kumar Upadhyay',
          role: 'Backend Engineer',
          status: 'RUNNING',
          uptime: 'Always Learning',
          bugs_fixed: 9999,
        };

        const json = JSON.stringify(payload, null, 2);
        const colored = json.replace(/("[^"]+")(\s*:)|("[^"]*")|(\b\d+\b)|([{}\[\],])/g, (m, key, colon, str, num, punct) => {
          if (key) return `<span class="key">${key}</span>${colon || ''}`;
          if (str) return `<span class="str">${str}</span>`;
          if (num) return `<span class="num">${num}</span>`;
          if (punct) return `<span class="punct">${punct}</span>`;
          return m;
        });

        const target = document.getElementById('actuator-json');
        target.innerHTML = colored;
      })();
    </script>
  </body>
</html>
